name: alkis_wohngebaeude
description: "Wohngebäude aus ALKIS (amtliches Liegenschaftskataster MV) — nur Gebäude mit Wohnfunktion"
tags: [wohngebäude, gebäude, building, wohnbebauung, ALKIS, amtlich, MV, kataster]

connection:
  type: wfs
  url: "https://www.geodaten-mv.de/dienste/alkis_wfs_sf"
  layer: "adv:AX_Gebaeude"
  crs: "EPSG:25833"

detection:
  dissolve: false

# Exclude non-residential buildings (2xxx = Wirtschaft/Gewerbe, 3xxx = Öffentlich, 9xxx = Sonstige)
exclude_tags:
  gebaeudefunktion: "^[^1]"

attribute_mappings:
  gebaeudefunktion:
    "1000": "Wohngebäude"
    "1010": "Wohnhaus"
    "1020": "Wohnheim"
    "1021": "Kinderheim"
    "1022": "Seniorenheim"
    "1023": "Schwesternwohnheim"
    "1024": "Studenten-/Schülerwohnheim"
    "1025": "Schullandheim"
    "1100": "Gemischt genutzt mit Wohnen"
    "1110": "Wohngebäude mit Handel und Dienstleistungen"
    "1120": "Wohngebäude mit Gewerbe und Industrie"
    "1121": "Wohn- und Bürogebäude"
    "1122": "Wohn- und Geschäftsgebäude"
    "1123": "Wohn- und Betriebsgebäude"
    "1130": "Wohngebäude mit Gemeinbedarf"
    "1131": "Wohn- und Verwaltungsgebäude"
    "1210": "Land-/Forstwirtschaftliches Wohngebäude"
    "1220": "Land-/Forstwirtschaftliches Wohn-/Wirtschaftsgebäude"
    "1221": "Bauernhaus"
    "1222": "Wohn-/Wirtschaftsgebäude"
    "1223": "Forsthaus"
    "1310": "Gebäude zur Freizeitgestaltung"
    "1311": "Ferienhaus"
    "1312": "Wochenendhaus"
    "1313": "Gartenhaus"

column_mapping:
  gebaeudefunktion: funktion
  gebaeudefunktion_lbl: funktion_lbl
  grundflaeche: grundflaeche_m2
