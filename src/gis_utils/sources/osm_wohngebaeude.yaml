name: osm_wohngebaeude
description: "Wohngebäude-Footprints aus OpenStreetMap (einzelne Gebäude, nicht aufgelöst)"
tags: [wohngebäude, gebäude, building, wohnbebauung, OSM, openstreetmap]

connection:
  type: osm
  tags:
    building: "^(yes|residential|house|detached|semidetached_house|apartments|farm|farmhouse)$"

detection:
  dissolve: false

# Drop buildings that have non-residential indicator tags
exclude_tags:
  shop: ".+"
  amenity: ".+"
  office: ".+"
  craft: ".+"
  tourism: ".+"
  leisure: ".+"
