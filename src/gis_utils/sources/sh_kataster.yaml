name: sh_kataster
description: "Flurstücke und Gemarkungen aus ALKIS Schleswig-Holstein — INSPIRE Kataster-WFS"
tags: [flurstück, gemarkung, kataster, parcel, cadastral, ALKIS, amtlich, SH, schleswig-holstein]

connection:
  type: wfs
  url: "https://service.gdi-sh.de/SH_INSPIREDOWNLOAD_AI_CP_ALKIS"
  version: "2.0.0"

layers:
  flurstuecke:
    wfs_layer: "cp:CadastralParcel"
    title: "Flurstücke (Cadastral Parcels)"
    tags: [flurstück, parcel, grundstück]
    column_mapping:
      label: flurstueck
      nationalCadastralReference: katasterreferenz
      areaValue: flaeche_m2

  gemarkungen:
    wfs_layer: "cp:CadastralZoning"
    title: "Gemarkungen / Katasterbezirke (Cadastral Zoning)"
    tags: [gemarkung, katasterbezirk, zoning, flur, gemeinde]
    column_mapping:
      label: gemarkung
      nationalCadastalZoningReference: katasterreferenz
      levelName: ebene
