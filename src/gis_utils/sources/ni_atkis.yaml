name: ni_atkis
description: "ATKIS Basis-DLM Niedersachsen — topographisches Landschaftsmodell (LGLN OpenGeoData, WFS Simple Features). Liefert Verkehr (Straße/Bahn) MIT Klassifizierung (widmung/bezeichnung) sowie Gewässer. Lagegenauigkeit Basis-DLM ca. ±3 m. © GeoBasis-DE/LGLN."
tags: [ATKIS, DLM, Basis-DLM, NI, niedersachsen, verkehr, autobahn, bundesstraße, straße, bahn, schiene, gewässer, topographie, open-data]

connection:
  type: wfs
  url: "https://opendata.lgln.niedersachsen.de/doorman/noauth/atkisbdlm_wfs_sf"
  version: "2.0.0"
  crs: "EPSG:25832"

layers:
  # --- Straße ---
  strasse:
    wfs_layer: "adv:AX_Strasse"
    title: "Straße (ZUSO mit Widmung+Bezeichnung; keine eigene Geometrie)"
    tags: [straße, klassifizierung, widmung, zuso]
    attribute_mappings:
      widmung:
        "1301": "Bundesautobahn"
        "1303": "Bundesstraße"
        "1305": "Landesstraße"
        "1306": "Kreisstraße"
        "1307": "Gemeindestraße"
        "1308": "Sonstige öffentliche Straße"
        "9997": "Sonstige"

  strassenachse:
    wfs_layer: "adv:AX_Strassenachse"
    title: "Straßenachse (Linie der Fahrbahnachse) — gefiltert nach Widmung+Bezeichnung"
    tags: [straße, achse, linie, autobahn, klassifizierung]
    classification_via:
      guide_layer: "adv:AX_Strassenachse"
      guide_only: true
      guide_to_classifier:
        link_attr: istTeilVon
        classifier_layer: "adv:AX_Strasse"
      filterable_attrs: [widmung, bezeichnung, name]

  strassenverkehrsflaeche:
    wfs_layer: "adv:AX_Strassenverkehr"
    title: "Straßenverkehrsfläche (Polygon der Fahrbahn inkl. Standstreifen)"
    tags: [straße, autobahn, verkehrsfläche, fahrbahn, polygon]
    classification_via:
      guide_layer: "adv:AX_Strassenachse"
      guide_to_classifier:
        link_attr: istTeilVon
        classifier_layer: "adv:AX_Strasse"
      spatial_buffer_m: 30
      filterable_attrs: [widmung, bezeichnung, name]

  # --- Bahn ---
  bahnstrecke:
    wfs_layer: "adv:AX_Bahnstrecke"
    title: "Bahnstrecke (Linie mit Bahnkategorie+Bezeichnung)"
    tags: [bahn, schiene, strecke, linie]
    attribute_mappings:
      bahnkategorie:
        "1100": "Eisenbahn"
        "1101": "Hauptbahn"
        "1102": "Nebenbahn"
        "1103": "S-Bahn"
        "1104": "Güterbahn"
        "1105": "Strecke des Personenfern-/Hochgeschwindigkeitsverkehrs"
        "1200": "Stadtschnellbahn / U-Bahn"
        "1201": "Straßenbahn"
        "1300": "Schmalspurbahn / Museumsbahn"
        "1400": "Magnetschwebebahn"

  bahnverkehrsflaeche:
    wfs_layer: "adv:AX_Bahnverkehr"
    title: "Bahnverkehrsfläche (Polygon der Gleisanlage)"
    tags: [bahn, schiene, verkehrsfläche, polygon]
    classification_via:
      guide_layer: "adv:AX_Bahnstrecke"
      spatial_buffer_m: 20
      filterable_attrs: [bahnkategorie, bezeichnung, name]

  # --- Gewässer ---
  fliessgewaesser:
    wfs_layer: "adv:AX_Fliessgewaesser"
    title: "Fließgewässer (Polygon)"
    tags: [gewässer, fluss, bach, polygon]

  gewaesserachse:
    wfs_layer: "adv:AX_Gewaesserachse"
    title: "Gewässerachse (Linie)"
    tags: [gewässer, achse, linie]

  stehendes_gewaesser:
    wfs_layer: "adv:AX_StehendesGewaesser"
    title: "Stehendes Gewässer (Polygon)"
    tags: [gewässer, see, teich, polygon]

  # --- Sonstiges ---
  leitung:
    wfs_layer: "adv:AX_Leitung"
    title: "Leitung (Freileitung, z.B. Hochspannung)"
    tags: [leitung, hochspannung, freileitung, linie]

  ortslage:
    wfs_layer: "adv:AX_Ortslage"
    title: "Ortslage (Siedlungsfläche)"
    tags: [ortslage, siedlung, polygon]

  wald:
    wfs_layer: "adv:AX_Wald"
    title: "Wald (Polygon)"
    tags: [wald, forst, polygon]
