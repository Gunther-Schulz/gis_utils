name: ni_alkis
description: "ALKIS Niedersachsen (vereinfacht, adv-Produkt ave 2.0) — Flurstücke, Katasterbezirke, Verwaltungseinheiten, Gebäude, Nutzungen. LGLN OpenGeoData, kein Passwort. Unterstützt ad-hoc bbox-GetFeature (kein StoredQuery nötig). © GeoBasis-DE/LGLN."
tags: [ALKIS, kataster, amtlich, NI, niedersachsen, flurstück, gemarkung, gemeinde, gebäude, nutzung, vereinfacht, open-data]

connection:
  type: wfs
  url: "https://opendata.lgln.niedersachsen.de/doorman/noauth/alkis_wfs_einfach"
  version: "2.0.0"
  crs: "EPSG:25832"

# Weitere LGLN-ALKIS-Dienste (gleiche doorman/noauth-Basis):
#   alkis_wfs_sf   — volles NAS-Schema als Simple Features (adv:AX_*)
#   alkis_wfs_nas  — NAS-konform (AAA-Vollschema)
#   alkis_wms      — Liegenschaftskarte (Styles: Farbe, SW, Gelb)

layers:
  flurstuecke:
    wfs_layer: "ave:Flurstueck"
    title: "Flurstücke"
    tags: [flurstück, parcel, grundstück]
    query_fields:
      gemarkung: gemarkung
      gemarkung_schluessel: gemaschl
      gemeinde: gemeinde
      gemeinde_schluessel: gmdschl
      flur: flur
      flur_schluessel: flurschl
      zaehler: flstnrzae
      nenner: flstnrnen
      kennzeichen: flstkennz
      kreis: kreis
      kreis_schluessel: kreisschl
    column_mapping:
      flstkennz: kennzeichen
      flaeche: flaeche_m2
      lagebeztxt: lagebezeichnung

  katasterbezirk:
    wfs_layer: "ave:KatasterBezirk"
    title: "Katasterbezirke (Gemarkungen und Flure)"
    tags: [gemarkung, flur, katasterbezirk]

  verwaltungseinheit:
    wfs_layer: "ave:VerwaltungsEinheit"
    title: "Verwaltungseinheiten (Gemeinden, Kreise, etc.)"
    tags: [gemeinde, kreis, verwaltung]

  gebaeude:
    wfs_layer: "ave:GebaeudeBauwerk"
    title: "Gebäude und Bauwerke"
    tags: [gebäude, building, bauwerk]

  nutzung:
    wfs_layer: "ave:Nutzung"
    title: "Tatsächliche Nutzung"
    tags: [nutzung, landuse, bodennutzung]

  nutzung_flurstueck:
    wfs_layer: "ave:NutzungFlurstueck"
    title: "Nutzungen je Flurstück"
    tags: [nutzung, flurstück]
